name: "Publish Expo Production & Notify"

on:
  workflow_run:
    workflows: ["Publish packages"]
    types:
      - completed

jobs:
  publish-expo-production:
    name: "[📱 REACT NATIVE] Publish Expo Production Update"
    runs-on: ubuntu-latest
    # No top-level conclusion gate — check-trigger step inspects the specific
    # react-native job result. This avoids skipping when an unrelated job
    # (e.g. publish-react) fails in the same workflow run.
    permissions:
      contents: write
      pull-requests: write
    outputs:
      published: ${{ steps.check-trigger.outputs.published }}
      eas-succeeded: ${{ steps.preview.outcome == 'success' }}
      qr-url: ${{ steps.preview.outputs.qr }}
      update-link: ${{ steps.preview.outputs.link }}
      pr-url: ${{ steps.create-pr.outputs.pull-request-url }}
      release-name: ${{ steps.release-info.outputs.release_name }}
      release-body: ${{ steps.release-info.outputs.release_body }}
      release-url: ${{ steps.release-info.outputs.release_url }}
    steps:
      - name: Check if react-native was published
        id: check-trigger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_ID: ${{ github.event.workflow_run.id }}
        run: |
          # Query the triggering workflow run's jobs to see if publish-react-native succeeded
          RN_JOB_CONCLUSION=$(gh api "repos/${{ github.repository }}/actions/runs/${RUN_ID}/jobs" \
            --jq '[.jobs[] | select(.name | contains("REACT NATIVE")) | .conclusion] | first' 2>/dev/null || echo "not_found")

          if [ "$RN_JOB_CONCLUSION" != "success" ]; then
            echo "React Native publish job did not succeed (got: $RN_JOB_CONCLUSION). Skipping."
            echo "published=false" >> $GITHUB_OUTPUT
          else
            echo "React Native publish job succeeded."
            echo "published=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for EXPO_TOKEN
        if: steps.check-trigger.outputs.published == 'true'
        id: expo-token-check
        run: |
          if [ -z "${{ secrets.EXPO_TOKEN }}" ]; then
            echo "EXPO_TOKEN not set. EAS update will be skipped but Slack notification will still be sent."
            echo "available=false" >> $GITHUB_OUTPUT
          else
            echo "available=true" >> $GITHUB_OUTPUT
          fi

      - name: Get release info
        if: steps.check-trigger.outputs.published == 'true'
        id: release-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the latest react-native release
          RELEASE_JSON=$(gh api repos/${{ github.repository }}/releases \
            --jq '[.[] | select(.tag_name | startswith("react-native-v"))][0]')

          if [ -z "$RELEASE_JSON" ] || [ "$RELEASE_JSON" = "null" ]; then
            echo "::error::No react-native release found. Cannot proceed."
            exit 1
          fi

          RELEASE_NAME=$(echo "$RELEASE_JSON" | jq -r '.name // empty')
          RELEASE_URL=$(echo "$RELEASE_JSON" | jq -r '.html_url // empty')
          RELEASE_TAG=$(echo "$RELEASE_JSON" | jq -r '.tag_name // empty')

          if [ -z "$RELEASE_TAG" ]; then
            echo "::error::Release tag is empty. Cannot proceed."
            exit 1
          fi

          echo "release_name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "release_url=${RELEASE_URL}" >> $GITHUB_OUTPUT
          echo "release_tag=${RELEASE_TAG}" >> $GITHUB_OUTPUT

          # Multiline body
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "release_body<<$EOF" >> $GITHUB_OUTPUT
          echo "$RELEASE_JSON" | jq -r '.body' >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4
        if: steps.check-trigger.outputs.published == 'true' && steps.expo-token-check.outputs.available == 'true'
        with:
          ref: ${{ steps.release-info.outputs.release_tag }}

      - uses: ./.github/actions/setup-node-pnpm
        if: steps.check-trigger.outputs.published == 'true' && steps.expo-token-check.outputs.available == 'true'
        name: Setup Node and pnpm

      - name: Build React Native package
        if: steps.check-trigger.outputs.published == 'true' && steps.expo-token-check.outputs.available == 'true'
        run: pnpm --filter @factorialco/f0-react-native build

      - name: Setup EAS
        if: steps.check-trigger.outputs.published == 'true' && steps.expo-token-check.outputs.available == 'true'
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS update to production branch
        if: steps.check-trigger.outputs.published == 'true' && steps.expo-token-check.outputs.available == 'true'
        id: preview
        continue-on-error: true
        uses: expo/expo-github-action/preview@v8
        with:
          working-directory: packages/react-native
          comment: false
          command: eas update --auto --branch production --message "${{ steps.release-info.outputs.release_name || 'Production update' }}" --non-interactive

      - name: Download QR code and update asset
        if: steps.preview.outcome == 'success'
        run: |
          curl -sL "${{ steps.preview.outputs.qr }}" -o packages/react-native/assets/images/expo-go-qr.svg

      - name: Create PR with updated QR code
        if: steps.preview.outcome == 'success'
        id: create-pr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_PLEASE_GH_TOKEN }}
          commit-message: "chore(react-native): update Expo Go production QR code"
          title: "chore(react-native): update Expo Go production QR code"
          body: |
            Automated update of the Expo Go production QR code after release `${{ steps.release-info.outputs.release_name }}`.

            - **EAS Update branch:** `production`
            - **Update link:** ${{ steps.preview.outputs.link }}
            - **Group ID:** ${{ steps.preview.outputs.groupId }}

            ### QR Code

            ![Expo Go Production QR](${{ steps.preview.outputs.qr }})
          branch: chore/update-expo-go-qr
          delete-branch: true
          add-paths: packages/react-native/assets/images/expo-go-qr.svg

      - name: Auto approve QR update PR
        if: steps.create-pr.outcome == 'success' && steps.create-pr.outputs.pull-request-number
        uses: juliangruber/approve-pull-request-action@b71c44ff142895ba07fad34389f1938a4e8ee7b0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          number: ${{ steps.create-pr.outputs.pull-request-number }}

      - name: Merge QR update PR
        if: steps.create-pr.outcome == 'success' && steps.create-pr.outputs.pull-request-number
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_GH_TOKEN }}
        run: |
          gh pr merge --squash --admin "${{ steps.create-pr.outputs.pull-request-number }}"

  notify-slack:
    name: "[📱 REACT NATIVE] Notify Slack with QR"
    runs-on: ubuntu-latest
    needs: publish-expo-production
    if: >-
      always() &&
      needs.publish-expo-production.outputs.published == 'true'
    steps:
      - name: Notify Slack
        env:
          RELEASE_BODY_RAW: ${{ needs.publish-expo-production.outputs.release-body }}
          RELEASE_URL: ${{ needs.publish-expo-production.outputs.release-url }}
          RELEASE_NAME: ${{ needs.publish-expo-production.outputs.release-name }}
          QR_URL: ${{ needs.publish-expo-production.outputs.qr-url }}
          UPDATE_LINK: ${{ needs.publish-expo-production.outputs.update-link }}
          PR_URL: ${{ needs.publish-expo-production.outputs.pr-url }}
          EAS_SUCCEEDED: ${{ needs.publish-expo-production.outputs.eas-succeeded }}
          PACKAGE: "@factorialco/f0-react-native"
          NPM_URL: "https://www.npmjs.com/package/@factorialco/f0-react-native?activeTab=versions"
        run: |
          # 1. Convert GitHub-style markdown to Slack mrkdwn
          RELEASE_BODY=$(echo "$RELEASE_BODY_RAW" | perl -pe '
            s/^### (.+)$/*\1*/;           # h3 -> bold
            s/^## (.+)$/*\1*/;            # h2 -> bold
            s/^(\s*[-*])\s+/• /;          # bullets
            s/\[([^\]]+)\]\(([^)]+)\)/<\2|\1>/g;  # links
          ')

          # 2. Build context elements (conditionally include PR and update links)
          CONTEXT_ELEMENTS=$(jq -n \
            --arg npm "$NPM_URL" \
            --arg rel_url "$RELEASE_URL" \
            --arg update "$UPDATE_LINK" \
            --arg pr "$PR_URL" \
            --arg eas "$EAS_SUCCEEDED" '
            [
              { type: "mrkdwn", text: "<\($npm)|npm package>" },
              { type: "mrkdwn", text: "<\($rel_url)|GitHub release>" }
            ]
            + (if $eas == "true" and $update != "" then [{ type: "mrkdwn", text: "<\($update)|Expo update>" }] else [] end)
            + (if $pr != "" then [{ type: "mrkdwn", text: "<\($pr)|QR update PR>" }] else [] end)
          ')

          # 3. Build Block-Kit payload
          #    Include QR accessory image only if EAS update succeeded.
          #    QR URL is SVG from qr.expo.dev — Slack may not render it,
          #    but the link in context serves as fallback.
          if [ "$EAS_SUCCEEDED" = "true" ] && [ -n "$QR_URL" ]; then
            SECTION=$(jq -n --arg body "$RELEASE_BODY" --arg qr "$QR_URL" '{
              type: "section",
              text: { type: "mrkdwn", text: $body },
              accessory: {
                type: "image",
                image_url: $qr,
                alt_text: "Expo Go QR Code"
              }
            }')
          else
            SECTION=$(jq -n --arg body "$RELEASE_BODY" '{
              type: "section",
              text: { type: "mrkdwn", text: $body }
            }')
          fi

          jq -n --arg rel_name "$RELEASE_NAME" \
                --argjson section "$SECTION" \
                --argjson ctx "$CONTEXT_ELEMENTS" '
          {
            blocks: [
              { type: "header",
                text: { type: "plain_text", text: "📱 New version \($rel_name) released" } },
              $section,
              { type: "context",
                elements: $ctx }
            ]
          }' > /tmp/payload.json

          # 4. Send
          curl -X POST -H "Content-Type: application/json" \
              --data @/tmp/payload.json \
              "${{ secrets.SLACK_WEBHOOK_ZERO_UPDATER }}"
