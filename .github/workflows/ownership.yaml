name: Ownership checks
on:
  pull_request:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  check:
    name: "📋 Validate module ownership and CODEOWNERS"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm
      # Only the ownership package is needed — skips the full monorepo install
      - name: Install ownership dependencies
        run: pnpm install --filter @factorialco/f0-ownership --ignore-scripts
      - name: Run ownership checks
        run: pnpm --filter @factorialco/f0-ownership run check
