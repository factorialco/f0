name: "Weekly F0 Changelog Summary"

on:
  schedule:
    - cron: "0 10 * * 5" # Every Friday at 10:00 UTC
  workflow_dispatch:
    inputs:
      from:
        description: "Start date (YYYY-MM-DD). Defaults to 7 days ago or last run."
        required: false
      to:
        description: "End date (YYYY-MM-DD). Defaults to today."
        required: false
      dry_run:
        description: "Skip publishing to Slack (summary is printed to the workflow log instead)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      ignore_last_run:
        description: "Ignore the cached last-run date and always use the last 7 days"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

env:
  PROVIDER: groq

jobs:
  summarize:
    name: "Generate and publish changelog summary"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Fetch full history so git log has all commits for the date range
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          cache: pnpm

      - name: Install changelog-summarizer dependencies
        run: pnpm install --filter @factorialco/f0-changelog-summarizer
        working-directory: ${{ github.workspace }}

      - name: Restore last-run cache
        # The CLI writes <repoRoot>/.cache/summarizer-last-run (auto-detected
        # git root = github.workspace). Cache the same path so the watermark persists.
        uses: actions/cache/restore@v4
        with:
          path: .cache/summarizer-last-run
          key: changelog-summarizer-last-run

      - name: Generate summary
        id: summarize
        env:
          FROM_DATE: ${{ inputs.from || '' }}
          TO_DATE: ${{ inputs.to || '' }}
          CHANGELOG_AI_API_KEY: ${{ secrets.CHANGELOG_AI_API_KEY }}
        run: |
          ARGS=(--provider "$PROVIDER")

          if [ -n "$CHANGELOG_AI_API_KEY" ]; then
            ARGS+=(--api-key "$CHANGELOG_AI_API_KEY")
          fi

          if [ -n "$FROM_DATE" ]; then
            ARGS+=(--from "$FROM_DATE")
          fi

          if [ -n "$TO_DATE" ]; then
            ARGS+=(--to "$TO_DATE")
          fi

          if [ "${{ inputs.ignore_last_run }}" = "true" ]; then
            ARGS+=(--ignore-last-run)
          fi

          pnpm tsx src/index.ts \
            "${ARGS[@]}" \
            --repo-root "${{ github.workspace }}" \
            --output /tmp/summary.md

          echo "summary_file=/tmp/summary.md" >> "$GITHUB_OUTPUT"
        working-directory: ${{ github.workspace }}/packages/changelog-summarizer

      - name: Save last-run cache
        # Save after a successful non-dry run so the next scheduled run knows
        # where to resume from. Skipped on dry runs to avoid advancing the
        # watermark for a run that didn't actually publish anything.
        if: ${{ inputs.dry_run != 'true' }}
        uses: actions/cache/save@v4
        with:
          path: .cache/summarizer-last-run
          key: changelog-summarizer-last-run

      - name: Print summary (dry run)
        if: ${{ inputs.dry_run == 'true' }}
        env:
          SUMMARY_FILE: ${{ steps.summarize.outputs.summary_file }}
        run: cat "$SUMMARY_FILE"

      - name: Publish summary to Slack
        if: ${{ inputs.dry_run != 'true' }}
        env:
          SUMMARY_FILE: ${{ steps.summarize.outputs.summary_file }}
        run: |
          SUMMARY_RAW=$(cat "$SUMMARY_FILE")

          # Convert GitHub-style markdown → Slack mrkdwn
          SUMMARY=$(echo "$SUMMARY_RAW" | perl -pe '
            s/^### (.+)$/*\1*/;
            s/^## (.+)$/*\1*/;
            s/^(\s*[-*])\s+/• /;
            s/\[([^\]]+)\]\(([^)]+)\)/<\2|\1>/g;
          ')

          # Build Block Kit payload
          jq -n --arg body "$SUMMARY" '
          {
            blocks: [
              {
                type: "section",
                text: { type: "mrkdwn", text: $body }
              }
            ]
          }' > /tmp/payload.json

          # Send to Slack
          curl -X POST -H "Content-Type: application/json" \
            --data @/tmp/payload.json \
            "${{ secrets.SLACK_WEBHOOK_F0_SUMMARIZER }}"
