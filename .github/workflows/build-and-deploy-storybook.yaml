name: "Build and Publish Storybook to Azure Static Web Apps"

on:
  push:
    branches:
      - "main"
      - "chore/azure-deploy" # TODO: Remove this branch. Was created to test the Azure deployment.
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PUBLIC_BUILD: true

jobs:
  # Detect which projects have changed
  detect-changes:
    uses: ./.github/workflows/_check-workspaces-changes.yaml

  notify-storybook-changes:
    needs: deploy
    name: "[📚 STORYBOOK] Notify component changes via GitHub Issue"
    runs-on: ubuntu-latest
    if: ${{ always() && needs.deploy.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run Storybook diff and open GitHub Issue
        run: |
          node scripts/storybook-diff.mjs \
            --storybook-url https://ds.factorial.dev \
            --snapshot scripts/storybook-snapshot.json \
            --github-token "${{ secrets.GITHUB_TOKEN }}" \
            --github-repo "${{ github.repository }}" \
            --commit-sha "${{ github.sha }}"

      - name: Commit updated snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/storybook-snapshot.json
          git diff --staged --quiet || git commit -m "chore: update storybook component snapshot [skip ci]"
          git push

  deploy:
    needs: detect-changes
    name: "[⚛️ REACT] Deploy Storybook to Azure Static Web Apps"
    # Prevents running on the release-please branch
    if: |
      needs.detect-changes.outputs.package_react == 'true' &&
      github.head_ref != 'release-please--branches--master' &&
      !contains(github.event.pull_request.labels.*.name, 'autorelease')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node and PNPM
        uses: ./.github/actions/setup-node-pnpm

      - name: Install dependencies
        run: |
          sed -i 's/"workspace:\*"/"latest"/g' packages/react/package.json
          pnpm install --no-frozen-lockfile

      - name: Build Core
        run: pnpm --filter @factorialco/f0-core build

      - name: Build Storybook
        run: pnpm --filter @factorialco/f0-react run build-storybook

      - name: Deploy Storybook to Azure
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          skip_app_build: true
          app_location: packages/react/storybook-static
