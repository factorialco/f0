name: Component enhancement
description: Propose a change or addition to an existing F0 component.
labels: ["f0:enhancement", "needs-triage"]
body:
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: F0Button
    validations:
      required: true
  - type: dropdown
    id: maturity
    attributes:
      label: Current maturity
      options:
        - Experimental
        - Stable
        - Deprecated
    validations:
      required: true
  - type: textarea
    id: change
    attributes:
      label: Proposed change
      description: What should change and why?
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact on consumers
      description: Is this a breaking change? Who's affected? Will it require a migration?
    validations:
      required: true
  - type: markdown
    attributes:
      value: |
        > Changes to **stable** components require a design review. Changes to **experimental** components can be iterated freely by the owning team.
