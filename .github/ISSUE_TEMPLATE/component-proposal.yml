name: Component proposal
description: Propose a new F0 component or pattern.
title: "[Proposal] "
labels: ["f0:proposal", "needs-design-review"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing! Every proposal is evaluated on its merits — F0 grows intentionally, and we say yes when a component has clear cross-team value.

        Before submitting, please walk through **Phase 0 — Discovery & Evaluation** below. It takes a few minutes and dramatically improves the chance your proposal moves forward. See the [contribution skill](https://github.com/factorialco/factorial-one/blob/main/packages/react/.skills/f0-component-contribution/SKILL.md#phase-0--discovery--evaluation-before-proposing) and [Contributions docs](https://main--67e8da3a08c39c5e2bb50a35.chromatic.com/?path=/docs/how-to-contribute--docs) for context.

  - type: input
    id: name
    attributes:
      label: Proposed component name
      placeholder: F0MyComponent
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem does it solve?
      description: Be concrete. What user need or recurring UI pattern is this addressing?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Phase 0 — Discovery & Evaluation

        Answer honestly. "I'm not sure" is a valid answer and a good reason to talk to an F0 designer **before** building anything.

  - type: textarea
    id: phase0-exists
    attributes:
      label: 1. Does it already exist in F0?
      description: Which F0 components/patterns did you check? (Use Storybook search, the MCP `list-all-documentation` tool, or ask Claude/OpenCode.)
    validations:
      required: true

  - type: textarea
    id: phase0-extend
    attributes:
      label: 2. Can an existing component be extended to cover this need?
      description: List the closest existing components and explain why extending them does/doesn't work.
    validations:
      required: true

  - type: textarea
    id: phase0-evidence
    attributes:
      label: 3. Evidence of cross-team need
      description: |
        We need at least **2 real use cases from different teams**. List teams, products, or repos where this need has come up. Link Slack threads, designs, Jira tickets, or existing ad-hoc implementations.

        If you only have 1 team's use case but believe it's foundational (e.g., a new primitive), say so — an F0 designer can waive the team-count requirement on review.
    validations:
      required: true

  - type: textarea
    id: phase0-pattern
    attributes:
      label: 4. Could a documentation pattern or composition solve it instead of a new component?
      description: Sometimes the answer is "compose existing pieces and document the recipe". Why is that not enough here?
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ### Proposal details

  - type: textarea
    id: api
    attributes:
      label: Rough API sketch
      description: Props, variants, slots. Pseudo-code or TypeScript is fine.
      render: tsx

  - type: input
    id: figma
    attributes:
      label: Figma link (optional at this stage)

  - type: markdown
    attributes:
      value: |
        ---
        ### Design review gate

        **Proposals do not move to Phase 1 (build in `experimental/`) until an F0 designer has reviewed and approved this proposal.** This protects everyone from wasted work and keeps the system coherent.

  - type: checkboxes
    id: design-review
    attributes:
      label: Design review status
      description: Leave unchecked when submitting. An F0 designer will check the box (or request changes) during review.
      options:
        - label: "✅ Reviewed and approved by an F0 designer — proposer may proceed to Phase 1 (`experimental/`)."
          required: false
