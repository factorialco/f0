name: Bug report
description: Report a bug in an F0 component.
labels: ["f0:bug", "needs-triage"]
body:
  - type: input
    id: component
    attributes:
      label: Component
      placeholder: F0Button
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: F0 version
      placeholder: 1.476.2
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal Storybook example, CodeSandbox link, or numbered steps.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: Browser, OS, framework version
