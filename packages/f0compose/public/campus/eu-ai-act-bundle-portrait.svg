<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="288" height="384" role="img" aria-label="EU AI Act Compliance Pack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A2A8A"/>
      <stop offset="55%" stop-color="#003399"/>
      <stop offset="100%" stop-color="#001E66"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <path id="eustar" d="M0,-26 L6.3,-8.6 L24.7,-8.0 L10.2,3.3 L15.3,21.0 L0,10.6 L-15.3,21.0 L-10.2,3.3 L-24.7,-8.0 L-6.3,-8.6 Z" fill="#FFCC00"/>
  </defs>

  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#glow)"/>

  <!-- EU circle of 12 stars, centred at 300,340 radius 150 -->
  <g>
    <use href="#eustar" transform="translate(300,190)"/>
    <use href="#eustar" transform="translate(375,210)"/>
    <use href="#eustar" transform="translate(430,265)"/>
    <use href="#eustar" transform="translate(450,340)"/>
    <use href="#eustar" transform="translate(430,415)"/>
    <use href="#eustar" transform="translate(375,470)"/>
    <use href="#eustar" transform="translate(300,490)"/>
    <use href="#eustar" transform="translate(225,470)"/>
    <use href="#eustar" transform="translate(170,415)"/>
    <use href="#eustar" transform="translate(150,340)"/>
    <use href="#eustar" transform="translate(170,265)"/>
    <use href="#eustar" transform="translate(225,210)"/>
  </g>

  <!-- "stack of 3" motif suggesting a bundle -->
  <g>
    <rect x="200" y="660" width="200" height="16" rx="8" fill="#FFCC00" opacity="0.35"/>
    <rect x="225" y="686" width="150" height="16" rx="8" fill="#FFCC00" opacity="0.55"/>
    <rect x="250" y="712" width="100" height="16" rx="8" fill="#FFCC00"/>
  </g>
</svg>
